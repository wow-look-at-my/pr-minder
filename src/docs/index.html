<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pr-minder</title>
<meta name="description" content="A GitHub App that keeps PR branches up to date, syncs labels with auto-merge, revives zombie PRs, and opens PRs for forgotten branches. Opt-in, event-driven.">
<style>
  :root {
    --fg: #1f2328; --muted: #59636e; --bg: #ffffff; --soft: #f6f8fa;
    --border: #d1d9e0; --link: #0969da; --accent: #1f883d; --code: #1f2328;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #e6edf3; --muted: #9198a1; --bg: #0d1117; --soft: #161b22;
      --border: #30363d; --link: #4493f8; --accent: #238636; --code: #e6edf3;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--fg); background: var(--bg);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 5rem; }
  .bar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
  .bar strong { font-size: 1.1rem; }
  .cta { display: inline-block; background: var(--accent); color: #fff; font-weight: 600; padding: .55rem 1.1rem; border-radius: 8px; }
  .cta:hover { text-decoration: none; filter: brightness(1.08); }
  h1 { font-size: 2.1rem; margin: 1.5rem 0 .3rem; }
  h2 { font-size: 1.4rem; margin: 2.5rem 0 .75rem; padding-top: .5rem; border-top: 1px solid var(--border); }
  h3 { font-size: 1.1rem; margin: 1.75rem 0 .5rem; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  p, ul, ol { margin: .6rem 0; }
  blockquote { margin: 1rem 0; padding: .2rem 1rem; border-left: 3px solid var(--accent); color: var(--muted); }
  code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: .9em; background: var(--soft); padding: .15em .4em; border-radius: 6px; }
  pre { background: var(--soft); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; overflow-x: auto; }
  pre code { background: none; padding: 0; color: var(--code); }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: .95rem; }
  th, td { border: 1px solid var(--border); padding: .5rem .7rem; text-align: left; vertical-align: top; }
  th { background: var(--soft); }
  footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 1px solid var(--border); color: var(--muted); font-size: .9rem; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <strong>pr-minder</strong>
    <a class="cta" href="https://github.com/apps/pr-minder/installations/new">Install the GitHub App &rarr;</a>
  </div>
  <main id="doc">Loading documentation&hellip;</main>
  <noscript><p>This page renders <a href="/llms.txt">/llms.txt</a>. Enable JavaScript, or read it directly.</p></noscript>
  <footer>
    <a href="https://github.com/apps/pr-minder/installations/new">Install</a> &middot;
    <a href="https://github.com/wow-look-at-my/pr-minder">Source</a> &middot;
    <a href="/llms.txt">llms.txt</a>
  </footer>
</div>
<script>
// Minimal Markdown renderer for our own llms.txt (headings, lists, tables, code,
// blockquotes, inline code/bold/links, bare-URL autolinking). Content is trusted.
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function inline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, (_, c) => "<code>" + c + "</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, (_, p, u) => p + '<a href="' + u + '">' + u + "</a>");
  return s;
}
function cells(row) { return row.replace(/^\|/, "").replace(/\|\s*$/, "").split("|").map((c) => c.trim()); }
function render(md) {
  const lines = md.replace(/\r/g, "").split("\n");
  let out = "", i = 0;
  const isBlock = (l) => /^(#{1,6}\s|```|>|\||\s*[-*]\s|\s*\d+\.\s)/.test(l);
  while (i < lines.length) {
    const line = lines[i];
    if (/^```/.test(line)) {
      i++; let code = "";
      while (i < lines.length && !/^```/.test(lines[i])) { code += lines[i] + "\n"; i++; }
      i++;
      out += "<pre><code>" + esc(code.replace(/\n$/, "")) + "</code></pre>";
    } else if (/^#{1,6}\s/.test(line)) {
      const n = line.match(/^#+/)[0].length;
      out += "<h" + n + ">" + inline(line.replace(/^#+\s/, "")) + "</h" + n + ">";
      i++;
    } else if (/^>\s?/.test(line)) {
      let q = "";
      while (i < lines.length && /^>\s?/.test(lines[i])) { q += lines[i].replace(/^>\s?/, "") + " "; i++; }
      out += "<blockquote>" + inline(q.trim()) + "</blockquote>";
    } else if (/^\|/.test(line)) {
      const rows = [];
      while (i < lines.length && /^\|/.test(lines[i])) { rows.push(lines[i]); i++; }
      let t = "<table><thead><tr>" + cells(rows[0]).map((c) => "<th>" + inline(c) + "</th>").join("") + "</tr></thead><tbody>";
      for (let r = 2; r < rows.length; r++) t += "<tr>" + cells(rows[r]).map((c) => "<td>" + inline(c) + "</td>").join("") + "</tr>";
      out += t + "</tbody></table>";
    } else if (/^\s*[-*]\s/.test(line)) {
      let items = "";
      while (i < lines.length && /^\s*[-*]\s/.test(lines[i])) { items += "<li>" + inline(lines[i].replace(/^\s*[-*]\s/, "")) + "</li>"; i++; }
      out += "<ul>" + items + "</ul>";
    } else if (/^\s*\d+\.\s/.test(line)) {
      let items = "";
      while (i < lines.length && /^\s*\d+\.\s/.test(lines[i])) { items += "<li>" + inline(lines[i].replace(/^\s*\d+\.\s/, "")) + "</li>"; i++; }
      out += "<ol>" + items + "</ol>";
    } else if (/^\s*$/.test(line)) {
      i++;
    } else {
      let para = "";
      while (i < lines.length && !/^\s*$/.test(lines[i]) && !isBlock(lines[i])) { para += lines[i] + " "; i++; }
      out += "<p>" + inline(para.trim()) + "</p>";
    }
  }
  return out;
}
fetch("/llms.txt").then((r) => r.text()).then((md) => {
  document.getElementById("doc").innerHTML = render(md);
}).catch(() => {
  document.getElementById("doc").innerHTML = '<p>Could not load the docs. Read <a href="/llms.txt">/llms.txt</a> directly.</p>';
});
</script>
</body>
</html>
